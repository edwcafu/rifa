<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Gran Rifa de Amor y Amistad</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family: Arial, Helvetica, sans-serif;
}

body{
    background:#f7cf19;
    padding:20px;
}

.container{
    max-width:1400px;
    margin:auto;
}

.banner{
    background:#000;
    color:#fff;
    text-align:center;
    padding:30px;
    border-radius:15px;
    margin-bottom:20px;
}

.banner h1{
    font-size:clamp(2rem,8vw,4rem);
    font-weight:900;
}

.banner p{
    margin-top:10px;
    font-size:clamp(1rem,3vw,1.5rem);
}

.content{
    display:flex;
    flex-direction:column;
    gap:20px;
}

.info{
    padding:20px;
}

.precio{
    display:flex;
    flex-wrap:wrap;
    align-items:center;
    gap:15px;
    margin-bottom:20px;
}

.precio span{
    font-size:clamp(1.2rem,4vw,2rem);
}

.valor{
    background:#000;
    color:#fff;
    padding:12px 20px;
    font-size:clamp(1.5rem,5vw,2.5rem);
    font-weight:bold;
    border-radius:15px;
}

.premio{
    background:#fff;
    padding:25px;    
    font-size:clamp(1rem,3vw,1.4rem);
    line-height:1.5;
    margin-bottom:20px;
    border-radius:15px;
}

.fundacion{
    background:#000;
    color:#fff;
    padding:15px;
    text-align:center;
    margin-bottom:30px;
    border-radius:15px;
    line-height:1.5;
    font-size:15px;
}

.fundacion a{
    color:#ffd700;
    font-weight:bold;
    text-decoration:underline;
}

.fundacion a:hover{
    color:#ffffff;
}

.contacto h2{
    margin-bottom:10px;
    font-size:1.4rem;
}

.contacto p{
    font-size:1.2rem;
    font-weight:bold;
    margin-bottom:5px;
}

.numeros{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(60px,1fr));
    gap:4px;
}

.numero{
    background:#fff;
    border:1px solid #ccc;
    text-align:center;
    padding:12px 5px;
    cursor:pointer;
    transition:.2s;
    border-radius:5px;
    font-weight:bold;
}

.numero:hover{
    background:#ffe680;
    transform:scale(1.03);
}

.numero.vendido{
    background:#0d47a1;
    color:#fff;
    position:relative;
    overflow:hidden;
}

.numero.vendido::after{
    content:"VENDIDO";
    position:absolute;
    top:50%;
    left:-20%;
    width:140%;
    text-align:center;
    background:rgba(255,255,255,0.25);
    color:#fff;
    font-size:9px;
    font-weight:bold;
    padding:2px 0;
    transform:rotate(-35deg);
}

.reserva{
    margin-bottom:15px;
    font-weight:bold;
    font-size:18px;
}

/* ==========================
   MODALES
========================== */

.modal{
    display:none;
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:rgba(0,0,0,.7);
    z-index:9999;
    padding:20px;
}

.modal-contenido{
    background:white;
    max-width:420px;
    margin:100px auto;
    padding:25px;
    border-radius:12px;
    text-align:center;
    box-shadow:0 10px 25px rgba(0,0,0,.3);
}

.modal-contenido h2{
    margin-bottom:10px;
}

.opcion-numero{
    background:#f2f2f2;
    margin:8px 0;
    padding:10px;
    border-radius:8px;
    font-size:22px;
    font-weight:bold;
}

.opcion-vendida{
    background:#e8f0ff;
    color:#0d47a1;
}

.btn-whatsapp{
    background:#25D366;
    color:white;
    padding:12px 20px;
    text-decoration:none;
    border-radius:5px;
    display:inline-block;
    font-weight:bold;
}

.btn-cerrar{
    background:#000;
